# Vetify local development stack
# Canton sandbox is started separately via: dpm sandbox --dar <dar> --json-api-port 7575
# (runs on host ports 7575/6865)
# This file adds PostgreSQL + PQS (Scribe) for read queries

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14
    container_name: vetify-postgres
    environment:
      POSTGRES_USER: vetify
      POSTGRES_PASSWORD: vetify
      POSTGRES_DB: vetify
    ports:
      # Configurable because host port 5432 is frequently already bound by a
      # system-level Postgres on dev machines (`ss -ltnp | grep 5432` to
      # check). Set POSTGRES_HOST_PORT in a root .env file if so, and keep
      # backend/.env's PQS_POSTGRES_PORT/APP_POSTGRES_PORT in sync — see
      # docs/local-dev-startup.md.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetify"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PQS (Scribe) ────────────────────────────────────────────────────────────
  # Subscribes to Canton ledger transaction stream and mirrors contract data
  # into PostgreSQL via the active() SQL function.
  pqs:
    image: europe-docker.pkg.dev/da-images/public/docker/scribe:3.4.1
    container_name: vetify-pqs
    command:
      - "pipeline"
      - "ledger"
      - "postgres-document"
    # `network_mode: host`, not `host.docker.internal` + bridge networking. Re-verified live
    # (2026-07-15, native Ubuntu dockerd, Docker Engine Community 29.1.2): `dpm sandbox`'s
    # ledger API binds `127.0.0.1` only, confirmed via `ss -tlnp` regardless of
    # --ledger-api-port. On Docker Desktop, `host.docker.internal` has special-cased magic
    # that can reach a loopback-only host service — which is what an earlier version of this
    # comment verified — but on plain native `dockerd` it resolves to the bridge gateway IP
    # (`host-gateway`), a real routable address the kernel treats normally, and a
    # loopback-bound service refuses a connection arriving from any non-loopback interface
    # (confirmed live: Scribe logged a 30s connect timeout to
    # `host.docker.internal/172.17.0.1:<port>` and never ingested anything). `network_mode:
    # host` sidesteps this entirely by sharing the host's real network namespace, so
    # "127.0.0.1" inside the container *is* the host's own loopback. If you're on Docker
    # Desktop instead of native dockerd (`docker info | grep "Operating System"`), switch
    # back to the `extra_hosts`/`host.docker.internal` form — host networking does NOT work
    # there, since "host" is then scoped to the Desktop VM, not the real host.
    network_mode: host
    environment:
      SCRIBE_SOURCE_LEDGER_HOST: localhost
      # Overridable because the default 6865 is frequently already bound by another
      # Canton sandbox on a dev machine running more than one Daml project at once
      # (confirmed live) — keep in sync with LEDGER_API_PORT passed to
      # `dpm sandbox --ledger-api-port` in scripts/demo-setup.sh.
      SCRIBE_SOURCE_LEDGER_PORT: "${LEDGER_API_PORT:-6865}"
      # No auth for local sandbox (dpm sandbox runs without auth by default).
      # Verified against a real Scribe 0.6.11 container: only "NoAuth" or
      # "OAuth" are accepted — "Unsafe" is rejected at startup with a format
      # error ("--source-ledger-auth ... constant string 'NoAuth'/'OAuth'").
      SCRIBE_SOURCE_LEDGER_AUTH: NoAuth
      # A host-networked container can't resolve the `postgres` compose service by name
      # (no bridge network, no compose-internal DNS) — reached via its host-published port
      # instead, so this must track POSTGRES_HOST_PORT, not the internal 5432.
      SCRIBE_TARGET_POSTGRES_HOST: localhost
      SCRIBE_TARGET_POSTGRES_PORT: "${POSTGRES_HOST_PORT:-5432}"
      SCRIBE_TARGET_POSTGRES_USERNAME: vetify
      SCRIBE_TARGET_POSTGRES_PASSWORD: vetify
      SCRIBE_TARGET_POSTGRES_DATABASE: vetify-pqs
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data:
